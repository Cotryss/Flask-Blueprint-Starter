{% extends "blocks/base.html" %}

{% block title %}
Login
{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-6 py-12">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-200 p-8">

        <div class="text-center mb-8">

                <div class="w-20 h-20 mx-auto rounded-full bg-blue-100 flex items-center justify-center mb-4">

                    <img
                        src="{{ url_for('static', filename='images/user.svg') }}"
                        alt="User"
                        class="w-10 h-10 object-contain"
                    >

                </div>

            <h1 class="text-3xl font-bold text-gray-900">
                Welcome Back
            </h1>

            <p class="text-gray-500 mt-2">
                Sign in to continue.
            </p>

        </div>

        <form method="POST" action="{{ url_for('core.login') }}" class="space-y-5">

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

            </div>

            <button
                class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-3 rounded-xl font-semibold">

                Login

            </button>

        </form>

        <p class="mt-6 text-center text-gray-600">

            Don't have an account?

            <a
                href="{{ url_for('core.register') }}"
                class="font-semibold text-blue-600 hover:underline">

                Register

            </a>

        </p>

    </div>

</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
