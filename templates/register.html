{% extends "blocks/base.html" %}

{% block title %}
Register
{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-6 py-12">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-200 p-8">

        <div class="text-center mb-8">

            <div class="w-20 h-20 mx-auto rounded-full bg-green-100 flex items-center justify-center mb-4">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-green-600" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M18 9v6m3-3h-6m-9 8h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>

                </svg>

            </div>

            <h1 class="text-3xl font-bold text-gray-900">
                Create Account
            </h1>

            <p class="text-gray-500 mt-2">
                Start building your Flask application.
            </p>

        </div>

        <form method="POST"
              action="{{ url_for('core.register') }}"
              class="space-y-5">

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500">

            </div>

            <button
                class="w-full bg-green-600 hover:bg-green-700 transition text-white py-3 rounded-xl font-semibold">

                Register

            </button>

        </form>

        <p class="mt-6 text-center text-gray-600">

            Already have an account?

            <a
                href="{{ url_for('core.login') }}"
                class="font-semibold text-green-600 hover:underline">

                Login

            </a>

        </p>

    </div>

</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
